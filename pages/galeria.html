<style>
/* MODAL NAVEGABLE */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
top:0;
left:0;
z-index:2000;
align-items:center;
justify-content:center;
}

.modal.open{
display:flex;
}

.modal img{
display:block;
max-width:85%;
max-height:85vh;
margin:auto;
border-radius:8px;
}

.modal-close{
position:fixed;
top:20px;
right:40px;
color:white;
font-size:40px;
cursor:pointer;
background:none;
border:none;
padding:0;
line-height:1;
}

.modal-close:hover{
color:#f1c40f;
transform:scale(1.1);
}

.modal-prev,
.modal-next{
position:fixed;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
font-size:28px;
padding:12px 16px;
cursor:pointer;
border:none;
border-radius:6px;
}

.modal-prev{ left:10px; }
.modal-next{ right:10px; }

.modal-prev:hover,
.modal-next:hover{
background:rgba(255,255,255,0.2);
transform:translateY(-50%) scale(1.05);
}

.modal-counter{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:rgba(255,255,255,0.7);
font-size:14px;
}
</style>
</head>

<script src="../js/script.js"></script>
<script>
(function(){
var modal    = document.getElementById('modal');
var modalImg = document.getElementById('modal-img');
var counter  = document.getElementById('modal-counter');
var imgs     = Array.from(document.querySelectorAll('.gallery-grid img'));
var current  = 0;

function open(idx){
current = idx;
modalImg.src = imgs[current].src;
counter.textContent = (current+1)+' / '+imgs.length;
modal.classList.add('open');
document.body.style.overflow='hidden';
}

function close(){
modal.classList.remove('open');
document.body.style.overflow='';
}

function prev(){
current=(current-1+imgs.length)%imgs.length;
modalImg.src=imgs[current].src;
counter.textContent=(current+1)+' / '+imgs.length;
}

function next(){
current=(current+1)%imgs.length;
modalImg.src=imgs[current].src;
counter.textContent=(current+1)+' / '+imgs.length;
}

imgs.forEach(function(img,idx){
img.addEventListener('click',function(){ open(idx); });
});

document.getElementById('modal-close').addEventListener('click',close);
document.getElementById('modal-prev').addEventListener('click',prev);
document.getElementById('modal-next').addEventListener('click',next);

modal.addEventListener('click',function(e){ if(e.target===modal) close(); });

document.addEventListener('keydown',function(e){
if(!modal.classList.contains('open')) return;
if(e.key==='Escape')      close();
if(e.key==='ArrowLeft')   prev();
if(e.key==='ArrowRight')  next();
});
})();
</script>
